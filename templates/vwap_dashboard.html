<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institutional VWAP Execution Matrix</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap');

        :root {
            --bg-primary: #09090b;
            --bg-card: rgba(22, 22, 26, 0.7);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --text-primary: #fafafa;
            --text-secondary: #71717a;
            --text-muted: #52525b;
            --accent-green: #34d399;
            --accent-red: #f87171;
            --accent-purple: #a78bfa;
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 16px;
            background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(167, 139, 250, 0.08), transparent);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.75rem;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1080px;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .nav-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            color: #8b95a5;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            transition: 0.2s;
        }
        
        .nav-btn:hover {
            color: #fff;
            border-color: rgba(255,255,255,0.3);
        }

        .chart-box {
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border-subtle);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            background: #050511;
        }

        .sandbox-panel {
            display: flex;
            gap: 16px;
            align-items: center;
            background: var(--bg-card);
            padding: 12px 20px;
            border-radius: var(--radius);
            border: 1px solid var(--border-subtle);
            margin-bottom: 16px;
        }

        .sandbox-panel label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .sandbox-panel input {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            width: 80px;
            text-align: center;
            font-weight: bold;
            font-family: 'Outfit', sans-serif;
        }

        .sync-btn {
            background: rgba(167, 139, 250, 0.15);
            border: 1px solid rgba(167, 139, 250, 0.4);
            color: #a78bfa;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s;
            margin-left: auto;
        }
        
        .sync-btn:hover {
            background: rgba(167, 139, 250, 0.3);
            color: white;
        }

        .stat-box {
            display: flex;
            gap: 16px;
        }
        
        .stat-pill {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <h1>Institutional VWAP Execution Matrix</h1>

    <div class="dashboard-container">
        <div class="toolbar">
            <div style="font-weight: 600; color:var(--accent-purple); font-family:'Outfit'; font-size:1.1rem; letter-spacing:1px;">
                SYMBOL: NQ=F (NASDAQ 100) <span style="font-size:0.7rem; color:var(--text-muted); font-family:'Inter'; margin-left:8px;">[15 MIN DELAY VIA YAHOO]</span>
            </div>
            <div>
                <a href="/" class="nav-btn">← Back to Main Dashboard</a>
            </div>
        </div>

        <div class="sandbox-panel">
            <div>
                <label>Start Date</label><br>
                <input type="date" id="inp-start-date" style="width: 140px;">
            </div>
            <div>
                <label>End Date</label><br>
                <input type="date" id="inp-end-date" style="width: 140px;">
            </div>
            <div class="stat-box" style="margin-left: 16px;">
                <div class="stat-pill">Win Rate: <span id="stat-wr" style="color:var(--accent-purple);">--%</span></div>
                <div class="stat-pill">Est. PnL: <span id="stat-pnl" style="color:var(--accent-green);">--%</span></div>
                <div class="stat-pill">Trades: <span id="stat-trades" style="color:var(--text-primary);">--</span></div>
            </div>
            <button class="sync-btn" onclick="fetchVwapData()">Run Historic Simulation</button>
        </div>

        <div class="chart-box">
            <div id="vwap_chart" style="height: 600px; width: 100%;"></div>
        </div>
        
        <div id="status" style="margin-top:16px; text-align:center; color:var(--text-muted); font-size:0.8rem;">
            Awaiting parameters...
        </div>
    </div>

    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    <script>
        var dp = document.getElementById('vwap_chart');
        var chart = LightweightCharts.createChart(dp, {
            width: dp.clientWidth, height: 600,
            layout: { backgroundColor: '#050511', textColor: '#8b95a5' },
            grid: { vertLines: { color: 'rgba(255,255,255,0.03)' }, horzLines: { color: 'rgba(255,255,255,0.03)' } },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            rightPriceScale: { borderColor: 'rgba(255,255,255,0.1)' },
            timeScale: { borderColor: 'rgba(255,255,255,0.1)', timeVisible: true }
        });

        var candles = chart.addCandlestickSeries({ upColor: '#34d399', downColor: '#f87171', borderVisible: false, wickUpColor: '#34d399', wickDownColor: '#f87171' });
        var vwapSeries = chart.addLineSeries({ color: '#a78bfa', lineWidth: 2, title: 'VWAP' });
        var upperSeries = chart.addLineSeries({ color: 'rgba(167, 139, 250, 0.4)', lineWidth: 1, lineStyle: 2, title: '+2.5σ' });
        var lowerSeries = chart.addLineSeries({ color: 'rgba(167, 139, 250, 0.4)', lineWidth: 1, lineStyle: 2, title: '-2.5σ' });

        window.addEventListener('resize', function () { chart.resize(dp.clientWidth, 600); });

        // Set default dates directly via JS
        var dStart = new Date();
        dStart.setDate(dStart.getDate() - 5);
        document.getElementById('inp-start-date').valueAsDate = dStart;
        
        var dEnd = new Date();
        document.getElementById('inp-end-date').valueAsDate = dEnd;

        async function fetchVwapData() {
            try {
                var sDate = document.getElementById('inp-start-date').value;
                var eDate = document.getElementById('inp-end-date').value;
                
                document.getElementById('status').innerText = "Simulating quantitative logic for " + sDate + " to " + eDate + " [LOCKED: 3.1σ / 2.6 ATR]...";
                
                var url = `/api/vwap_data?symbol=NQ=F&start_date=${sDate}&end_date=${eDate}`;
                
                var res = await fetch(url);
                var json = await res.json();
                
                if (json.error) {
                    document.getElementById('status').innerText = "Error: " + json.error;
                    return;
                }
                
                var data = json.data;
                var candleData = [];
                var vData = [];
                var uData = [];
                var lData = [];
                
                for(var i=0; i<data.length; i++) {
                    var d = data[i];
                    candleData.push({ time: d.time, open: d.open, high: d.high, low: d.low, close: d.close });
                    
                    if (d.vwap !== null) vData.push({ time: d.time, value: d.vwap });
                    if (d.upper !== null) uData.push({ time: d.time, value: d.upper });
                    if (d.lower !== null) lData.push({ time: d.time, value: d.lower });
                }
                
                candles.setData(candleData);
                vwapSeries.setData(vData);
                upperSeries.setData(uData);
                lowerSeries.setData(lData);
                
                // Directly plot Backend Simulated Markers
                if (json.markers) {
                    json.markers.sort((a,b) => a.time - b.time);
                    candles.setMarkers(json.markers);
                }
                
                if (json.stats) {
                    document.getElementById('stat-wr').innerText = json.stats.win_rate + '%';
                    document.getElementById('stat-pnl').innerText = (json.stats.pnl_pct > 0 ? '+' : '') + json.stats.pnl_pct + '%';
                    document.getElementById('stat-pnl').style.color = json.stats.pnl_pct > 0 ? '#34d399' : '#f87171';
                    document.getElementById('stat-trades').innerText = json.stats.total;
                }
                
                document.getElementById('status').innerText = "Matrix synced successfully. Loaded " + data.length + " candles.";
                
            } catch(e) {
                document.getElementById('status').innerText = "Failed to load: " + e.message;
            }
        }
        
        fetchVwapData();
    </script>
</body>

</html>
