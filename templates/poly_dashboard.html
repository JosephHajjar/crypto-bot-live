<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Polymarket Edge Backtester</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0e14;
            --panel-bg: #151a22;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-purple: #8b5cf6;
            --border-color: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sandbox-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            flex-wrap: wrap;
        }

        label {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: block;
        }

        input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
        }

        .sync-btn {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .sync-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .stat-box {
            display: flex;
            gap: 16px;
        }

        .stat-pill {
            background: rgba(0,0,0,0.3);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid var(--border-color);
        }

        .chart-box {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            position: relative;
        }

        #chart { width: 100%; height: 600px; }
        #status { font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; }

        .loader {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            color: var(--accent-blue);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Polymarket Probabilistic Decay Sandbox</h1>
    </div>

    <div class="sandbox-panel">
        <div>
            <label>Trades Simulated</label>
            <input type="number" id="inp-trades" value="1000" style="width: 100px;">
        </div>
        <div>
            <label>Capital ($)</label>
            <input type="number" id="inp-capital" value="1000" style="width: 100px;">
        </div>
        <div>
            <label>Implied Odds Ceiling</label>
            <input type="number" id="inp-implied" value="0.05" step="0.01" style="width: 100px;">
        </div>
        <button class="sync-btn" onclick="fetchPolyData()">Run Simulation</button>

        <div class="stat-box" style="margin-left:auto;">
            <div class="stat-pill">Win Rate: <span id="stat-wr" style="color:var(--accent-green);">--%</span></div>
            <div class="stat-pill">Sim. PnL: <span id="stat-pnl" style="color:var(--accent-purple);">--%</span></div>
            <div class="stat-pill">Final Liquidity: <span id="stat-cash" style="color:white;">--</span></div>
        </div>
    </div>

    <div class="chart-box">
        <div id="status">Ready for Simulation.</div>
        <div id="loader" class="loader">Running Quantitative Simulation...</div>
        <div id="chart"></div>
    </div>

    <script>
        var chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { background: { color: '#151a22' }, textColor: '#94a3b8' },
            grid: { vertLines: { color: 'rgba(255,255,255,0.02)' }, horzLines: { color: 'rgba(255,255,255,0.02)' } },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            rightPriceScale: { borderColor: 'rgba(255,255,255,0.1)' },
            timeScale: { borderColor: 'rgba(255,255,255,0.1)', timeVisible: true }
        });

        // Use area series for Capital Growth Curve
        var areaSeries = chart.addAreaSeries({
            lineColor: '#8b5cf6',
            topColor: 'rgba(139, 92, 246, 0.4)',
            bottomColor: 'rgba(139, 92, 246, 0.0)',
            lineWidth: 2,
        });

        var dp = document.getElementById('chart');
        window.addEventListener('resize', function () { chart.resize(dp.clientWidth, 600); });

        async function fetchPolyData() {
            var loader = document.getElementById('loader');
            loader.style.display = 'block';
            
            try {
                var trades = document.getElementById('inp-trades').value;
                var capital = document.getElementById('inp-capital').value;
                var implied = document.getElementById('inp-implied').value;
                
                document.getElementById('status').innerText = "Running " + trades + " probabilistic sweeps against Polymarket tick limits...";
                
                var res = await fetch(`/api/poly_backtest?trades=${trades}&capital=${capital}&implied=${implied}`);
                var json = await res.json();
                
                if (json.error) {
                    alert(json.error);
                    loader.style.display = 'none';
                    return;
                }

                // Inject Data
                areaSeries.setData(json.data);
                areaSeries.setMarkers(json.markers);

                // Update Scoreboard
                document.getElementById('stat-wr').innerText = json.stats.win_rate + '%';
                document.getElementById('stat-pnl').innerText = json.stats.roi_pct + '%';
                document.getElementById('stat-cash').innerText = '$' + json.stats.final_capital.toLocaleString();
                
                document.getElementById('status').innerText = "Simulation generated " + json.stats.total_trades + " non-overfitted resolutions.";
                
                chart.timeScale().fitContent();

            } catch (err) {
                console.error(err);
                alert("Error validating prediction matrix.");
            }
            loader.style.display = 'none';
        }
        
        fetchPolyData(); // Initial load
    </script>
</body>
</html>
