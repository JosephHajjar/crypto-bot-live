services:
  - type: web
    name: ai-trading-bot
    env: python
    buildCommand: "pip install -r requirements.txt && pip install gunicorn"
    startCommand: "bash run.sh"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
    disk:
      name: trading-data
      mountPath: /opt/render/project/src/data_storage
      sizeGB: 1
