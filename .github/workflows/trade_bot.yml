name: Hyperliquid AI execution Daemon

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '*/15 * * * *'  # Runs exactly every 15 minutes physically
  workflow_dispatch:        # Allows manual execution from the GitHub Web UI

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # Caches dependencies to make it ultra fast

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Execute Live Edge Evaluation
        env:
          HYPERLIQUID_WALLET_ADDRESS: ${{ secrets.HYPERLIQUID_WALLET_ADDRESS }}
          HYPERLIQUID_API_SECRET: ${{ secrets.HYPERLIQUID_API_SECRET }}
        run: |
          python trade_live.py --cron

      - name: Commit and Push Bot State
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data_storage/
          git commit -m "Auto-update bot tracking state [skip ci]" || echo "No state changes to commit"
          git push
